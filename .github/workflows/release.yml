name: Release GVI Application

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile and Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npm run generate-icon
          npm run pack

          $rcedit = Get-ChildItem -Path ".cache\electron-builder\winCodeSign" -Recurse -Filter rcedit-x64.exe | Select-Object -First 1 -ExpandProperty FullName
          if (-not $rcedit) {
            throw "No se encontro rcedit para aplicar el icono al ejecutable."
          }

          $exe = "dist\win-unpacked\GVI.exe"
          $icon = "build\icon.ico"
          if (-not (Test-Path $exe)) {
            throw "No se encontro el ejecutable generado: $exe"
          }
          if (-not (Test-Path $icon)) {
            throw "No se encontro el icono del programa: $icon"
          }

          & $rcedit $exe `
            --set-icon $icon `
            --set-version-string FileDescription "GVI - Gestor de Ventas Intuitivo" `
            --set-version-string ProductName "GVI" `
            --set-version-string OriginalFilename "GVI.exe"

          npx electron-builder --win nsis --prepackaged "dist\win-unpacked" --publish always
